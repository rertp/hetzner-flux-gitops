apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1h
  url: <link-to-your-repo>
  ref:
    branch: main
  secretRef:
    name: flux-system
  ignore: |
    /*
    !/infrastructure
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  url: <link-to-your-repo>
  ref:
    branch: main
  secretRef:
    name: flux-system
  ignore: |
    /*
    !/apps
