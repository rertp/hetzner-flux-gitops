apiVersion: v1
kind: Namespace
metadata:
  name: infisical-operator
  labels:
    toolkit.fluxcd.io/tenant: platform-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: infisical
  namespace: infisical-operator
spec:
  interval: 24h
  url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infisical-operator
  namespace: infisical-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: secrets-operator
      version: ">=0.9.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: infisical
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllerManager:
      manager:
        image:
          repository: infisical/kubernetes-operator
