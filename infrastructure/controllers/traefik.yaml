apiVersion: v1
kind: Namespace
metadata:
  name: traefik-system
  labels:
    toolkit.fluxcd.io/tenant: platform-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "33.1.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
      interval: 24h
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
    deployment:
      replicas: 2
    service:
      type: LoadBalancer
      annotations:
        load-balancer.hetzner.cloud/name: traefik-ingress
        load-balancer.hetzner.cloud/location: fsn1
        load-balancer.hetzner.cloud/type: lb11
        load-balancer.hetzner.cloud/algorithm-type: round_robin
        load-balancer.hetzner.cloud/ipv6-disabled: "true"
        load-balancer.hetzner.cloud/use-private-ip: "true"
        load-balancer.hetzner.cloud/disable-private-ingress: "true"
        load-balancer.hetzner.cloud/node-selector: "!node-role.kubernetes.io/control-plane"
        load-balancer.hetzner.cloud/health-check-protocol: tcp
        load-balancer.hetzner.cloud/health-check-interval: 5s
        load-balancer.hetzner.cloud/health-check-timeout: 5s
        load-balancer.hetzner.cloud/health-check-retries: "3"
        load-balancer.hetzner.cloud/uses-proxyprotocol: "false"
    ports:
      web:
        port: 8000
        exposedPort: 80
        expose:
          default: true
        protocol: TCP
      websecure:
        port: 8443
        exposedPort: 443
        expose:
          default: true
        protocol: TCP
        tls:
          enabled: true
      traefik:
        port: 8080
        expose:
          default: false
    ping:
      entryPoint: traefik
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
    logs:
      access:
        enabled: true
