apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-cluster
  namespace: databases
spec:
  instances: 3
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
  storage:
    size: 50Gi
    storageClass: hcloud-volumes
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backup
      endpointURL: <s3-endpoint-url>
      s3Credentials:
        accessKeyId:
          name: s3-credentials
          key: S3_ACCESS_KEY_ID
        secretAccessKey:
          name: s3-credentials
          key: S3_ACCESS_KEY_SECRET
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    retentionPolicy: "30d"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"
